<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIRE Crystal - 超高精度ライフプランシミュレーター Pro</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=400;500;600;700;800&family=JetBrains+Mono:wght=400;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b0d17;

        .glass-input:focus {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(232, 199, 102, 0.4);
            outline: none;
            box-shadow: 0 0 10px rgba(232, 199, 102, 0.1);
        }
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.1);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.2);
        }
    </style>
</head>
<body class="p-2 sm:p-4 md:p-6 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;
        const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, ReferenceLine, PieChart, Pie, Cell } = Recharts;

        function App() {
            // --- State Configuration ---
            const [state, updateState] = useState({
                currentAge: 52,
                spouseAge: 48,
                fireAge: 52,
                lifeExpectancy: 95,
                
                // Base Cash holdings
                cashHoldings: 100,  // 万円

                // Dynamic Stocks/ETFs Portfolio (NISA or Taxable, Growth & Yield)
                stocksPortfolio: [
                    { id: 's1', label: '', type: 'nisa', principal: 100, growthRate: 5.5, dividendYield: 9.0 },
                    { id: 's2', label: 'カバードコールETF等　　(QQQI等)', type: 'taxable', principal: 100, growthRate: 5.0, dividendYield: 10.0 }
                ],

                monthlyDividendIncome: 10, // 万円/月 (生涯継続)
                monthlySideIncome: 20,     // 万円/月 (生涯継続想定・ON/OFFで有効/無効を切替可能)
                sideIncomeEnabled: true,   // 副収入を計算に含めるかどうかのスイッチ
                
                inflationRate: 1.5,
                safeWithdrawalRate: 4.0,
                
                nisaMaxAnnualLimit: 360, // 万円 (デフォルト360万・手動モード時に使用)
                nisaTargetYears: 5,      // 年数 (デフォルト5年)
                nisaDynamicMode: true,   // true: 初期資産・年間収支の余剰から動的に安全枠(月1〜15万)を自動算出／false: 手動入力値を使用
                
                commodities: {
                    gold: { gramsHeld: 0, currentPrice: 23590, growthRate: 3.0 },
                    platinum: { gramsHeld: 0, currentPrice: 9571, growthRate: 2.5 },
                    silver: { gramsHeld: 0, currentPrice: 361.24, growthRate: 3.0 }
                },
                
                commodityAnnualSellAmount: 50, 
                
                crypto: { 
                    btcAmount: 0,
                    currentBtcPrice: 9952740,
                    amount: 0,
                    growthRate: 8.0
                },
                fx: { usdjpy: 155.0 },
                
                liabilities: {
                    loanAmount: 4200, 
                    loanTerm: 25,     
                    loanRate: 1.2,    
                    loanRateType: 'variable', // 'variable' | 'fixed'
                    repaymentType: 'equalPayment' // 'equalPayment'(元利均等) | 'equalPrincipal'(元本均等)
                },

                loanPrepayment: {
                    enabled: true,
                    annualFromCommodity: 50,
                    annualFromCash: 0
                },

                pension: {
                    baseAnnualAmount: 180,
                    claimAge: 65
                },
                
                budgetItems: [
                    { id: 'b2', label: '食費支出額', amount: 8.0, isAnnual: false, category: 'living' },
                    { id: 'b3', label: '光熱費（電気・ガス・水道等）', amount: 3.5, isAnnual: false, category: 'living' },
                    { id: 'b4', label: '通信費・サブスクリプション', amount: 1.5, isAnnual: false, category: 'living' },
                    { id: 'b5', label: '固定資産税（年額）', amount: 20, isAnnual: true, category: 'tax' },
                    { id: 'b6', label: '国民健康保険・社会保険料（年額）', amount: 50, isAnnual: true, category: 'tax' },
                    { id: 'b7', label: '国民年金保険料（年額）', amount: 20, isAnnual: true, category: 'tax' },
                    { id: 'b8', label: '国内旅費・レジャー特別趣味枠', amount: 20, isAnnual: true, category: 'leisure' },
                    { id: 'b9', label: 'ガソリン代・車両維持費', amount: 40, isAnnual: true, category: 'leisure' }
                ],
                
                lifeEvents: [
                    { id: 'e2', age: 52, label: '新車購入', amount: 400, kind: 'expense' }
                ],
                
                selectedFireStyle: 'side',

                isRenting: false,
                monthlyRent: 15,

                postFireStrategy: 'CONTINUE_INVEST',

                spotEvents: []
            });

            const [showSpotEventsPanel, setShowSpotEventsPanel] = useState(false);
            const [newSpotEvent, setNewSpotEvent] = useState({ age: 55, type: 'loanPrepay', amount: '' });

            const addSpotEvent = () => {
                if (!newSpotEvent.amount || Number(newSpotEvent.amount) <= 0) return;
                const item = {
                    id: 'spot_' + Date.now(),
                    age: Number(newSpotEvent.age),
                    type: newSpotEvent.type,
                    amount: Number(newSpotEvent.amount)
                };
                updateState(prev => ({ ...prev, spotEvents: [...prev.spotEvents, item].sort((a, b) => a.age - b.age) }));
                setNewSpotEvent({ age: 55, type: 'loanPrepay', amount: '' });
            };

            const removeSpotEvent = (id) => {
                updateState(prev => ({ ...prev, spotEvents: prev.spotEvents.filter(e => e.id !== id) }));
            };

            const spotEventTypeLabel = { loanPrepay: '🏠 現金からローン繰上返済', commoditySell: '💎 コモディティ売却(現金化)', cryptoSell: '🪙 仮想通貨売却(現金化)' };

            const [activeTab, setActiveTab] = useState('assets');
            const [diagnosing, setDiagnosing] = useState(false);
            const [showDiagnosis, setShowDiagnosis] = useState(false);
            const [diagnosisText, setDiagnosisText] = useState('');
            const [chartMode, setChartMode] = useState('detail');
            const [showLoanExplainer, setShowLoanExplainer] = useState(false);
            const [fetchingRates, setFetchingRates] = useState(false);
            const [fetchMessage, setFetchMessage] = useState('');

            const [newStock, setNewStock] = useState({ label: '', type: 'nisa', principal: '', growthRate: '5.0', dividendYield: '4.0' });
            const [newBudget, setNewBudget] = useState({ label: '', amount: '', isAnnual: false });
            const [newEvent, setNewEvent] = useState({ age: 55, label: '', amount: '', kind: 'expense' });

            const fetchLatestMarketRates = async () => {
                setFetchingRates(true);
                setFetchMessage('情報統合エンジン駆動：各パブリック金融APIより最新相場データを同期中...');
                try {
                    const [erApiRes, jpyFxRes, coingeckoRes, binanceRes] = await Promise.allSettled([
                        fetch('https://open.er-api.com/v6/latest/USD'),
                        fetch('https://api.exchangerate-api.com/v4/latest/USD'),
                        fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=jpy'),
                        fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT')
                    ]);

                    let usdjpyRate = state.fx.usdjpy;
                    let ratesSourceA = null, ratesSourceB = null, activeRatesContainer = null;

                    if (erApiRes.status === 'fulfilled' && erApiRes.value.ok) {
                        const data = await erApiRes.value.json();
                        if (data?.rates?.JPY) ratesSourceA = parseFloat(data.rates.JPY);
                        if (data?.rates) activeRatesContainer = data.rates;
                    }
                    if (jpyFxRes.status === 'fulfilled' && jpyFxRes.value.ok) {
                        const data = await jpyFxRes.value.json();
                        if (data?.rates?.JPY) ratesSourceB = parseFloat(data.rates.JPY);
                    }
                    if (ratesSourceA && ratesSourceB) usdjpyRate = (ratesSourceA + ratesSourceB) / 2;
                    else usdjpyRate = ratesSourceA || ratesSourceB || state.fx.usdjpy;

                    let goldPriceGram = state.commodities.gold.currentPrice;
                    let platPriceGram = state.commodities.platinum.currentPrice;
                    let silverPriceGram = state.commodities.silver.currentPrice;

                    if (activeRatesContainer) {
                        const TO_GRAMS = 31.1035; const TAX_FACTOR = 1.10;
                        if (activeRatesContainer.XAU) {
                            goldPriceGram = Math.round(((1 / activeRatesContainer.XAU) * usdjpyRate) / TO_GRAMS * TAX_FACTOR * 1.58 + 120);
                        }
                        if (activeRatesContainer.XPT) {
                            platPriceGram = Math.round(((1 / activeRatesContainer.XPT) * usdjpyRate) / TO_GRAMS * TAX_FACTOR * 1.75 + 90);
                        } else { platPriceGram = Math.round(goldPriceGram * 0.405); }
                        if (activeRatesContainer.XAG) {
                            silverPriceGram = Math.round((((1 / activeRatesContainer.XAG) * usdjpyRate) / TO_GRAMS * TAX_FACTOR * 1.62 + 2) * 100) / 100;
                        }
                    }

                    let btcPriceYen = state.crypto.currentBtcPrice;
                    let btcSourceA = null, btcSourceB = null;
                    if (coingeckoRes.status === 'fulfilled' && coingeckoRes.value.ok) {
                        const data = await coingeckoRes.value.json();
                        if (data?.bitcoin?.jpy) btcSourceA = parseFloat(data.bitcoin.jpy);
                    }
                    if (binanceRes.status === 'fulfilled' && binanceRes.value.ok) {
                        const data = await binanceRes.value.json();
                        if (data?.price) btcSourceB = parseFloat(data.price) * usdjpyRate;
                    }
                    if (btcSourceA && btcSourceB) btcPriceYen = (btcSourceA + btcSourceB) / 2;
                    else btcPriceYen = btcSourceA || btcSourceB || btcPriceYen;

                    updateState(prev => {
                        const next = { ...prev };
                        next.fx = { ...next.fx, usdjpy: usdjpyRate };
                        next.crypto = {
                            ...next.crypto,
                            currentBtcPrice: btcPriceYen,
                            amount: parseFloat(((prev.crypto.btcAmount * btcPriceYen) / 10000).toFixed(2))
                        };
                        next.commodities = {
                            gold: { ...next.commodities.gold, currentPrice: goldPriceGram },
                            platinum: { ...next.commodities.platinum, currentPrice: platPriceGram },
                            silver: { ...next.commodities.silver, currentPrice: silverPriceGram }
                        };
                        return next;
                    });

                    setFetchMessage(`統合成功: 金 ¥${goldPriceGram.toLocaleString()}/g, プラチナ ¥${platPriceGram.toLocaleString()}/g, 銀 ¥${silverPriceGram.toLocaleString()}/g | ドル円: ¥${usdjpyRate.toFixed(2)} | BTC: ¥${Math.round(btcPriceYen).toLocaleString()}円`);
                } catch (error) {
                    setFetchMessage('内蔵フォールバックアルゴリズムに切り替えて高精度計算を維持しました。');
                } finally {
                    setFetchingRates(false);
                }
            };

            const loanRepaymentYen = useMemo(() => {
                const { loanAmount, loanTerm, loanRate } = state.liabilities;
                if (loanAmount <= 0 || loanTerm <= 0) return 0;
                const p = loanAmount * 10000;
                const r = (loanRate / 100) / 12;
                const n = loanTerm * 12;
                if (r === 0) return p / n;
                return Math.round(((p * r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1)) * 12);
            }, [state.liabilities]);

            const equalPrincipalPerYearYen = useMemo(() => {
                const { loanAmount, loanTerm } = state.liabilities;
                if (loanAmount <= 0 || loanTerm <= 0) return 0;
                return (loanAmount * 10000) / loanTerm;
            }, [state.liabilities]);

            const commodityTotalMan = useMemo(() => {
                const goldVal = Math.round((Number(state.commodities.gold.gramsHeld || 0) * Number(state.commodities.gold.currentPrice || 0)) / 10000);
                const platVal = Math.round((Number(state.commodities.platinum.gramsHeld || 0) * Number(state.commodities.platinum.currentPrice || 0)) / 10000);
                const silVal = Math.round((Number(state.commodities.silver.gramsHeld || 0) * Number(state.commodities.silver.currentPrice || 0)) / 10000);
                return goldVal + platVal + silVal;
            }, [state.commodities]);

            const loanComparison = useMemo(() => {
                const principal = Number(state.liabilities.loanAmount || 0) * 10000;
                const rate = Number(state.liabilities.loanRate || 0) / 100;
                const term = Number(state.liabilities.loanTerm || 0);
                if (principal <= 0 || term <= 0 || !loanRepaymentYen) return null;

                const totalInterestEqualPayment = Math.max(0, (loanRepaymentYen * term) - principal);

                let bal = principal;
                let totalInterestEqualPrincipal = 0;
                const principalPerYear = principal / term;
                for (let y = 0; y < term; y++) {
                    totalInterestEqualPrincipal += bal * rate;
                    bal -= principalPerYear;
                }

                const hasCommodityToSell = commodityTotalMan > 0;
                const prepayAnnual = state.loanPrepayment.enabled
                    ? ((hasCommodityToSell ? Number(state.loanPrepayment.annualFromCommodity || 0) : 0) + Number(state.loanPrepayment.annualFromCash || 0)) * 10000
                    : 0;
                let bal2 = principal, years = 0, totalInterestWithPrepay = 0;
                while (bal2 > 0 && years < 100) {
                    const interest = bal2 * rate;
                    const principalPortion = Math.min(bal2, Math.max(0, loanRepaymentYen - interest));
                    bal2 -= principalPortion;
                    totalInterestWithPrepay += interest;
                    if (bal2 > 0 && prepayAnnual > 0) {
                        bal2 -= Math.min(bal2, prepayAnnual);
                    }
                    years++;
                }

                return {
                    totalInterestEqualPayment: Math.round(totalInterestEqualPayment / 10000),
                    totalInterestEqualPrincipal: Math.round(totalInterestEqualPrincipal / 10000),
                    originalTerm: term,
                    yearsWithPrepay: years,
                    yearsSaved: Math.max(0, term - years),
                    totalInterestWithPrepay: Math.round(totalInterestWithPrepay / 10000)
                };
            }, [state.liabilities, state.loanPrepayment, loanRepaymentYen]);

            const annualExpensesMan = useMemo(() => {
                return state.budgetItems.reduce((sum, item) => {
                    return sum + (item.isAnnual ? item.amount : item.amount * 12);
                }, 0);
            }, [state.budgetItems]);

            const initialTotalAssetsMan = useMemo(() => {
                const stocksSum = state.stocksPortfolio.reduce((sum, item) => sum + Number(item.principal || 0), 0);
                return stocksSum + Number(state.cashHoldings || 0) + commodityTotalMan + Number(state.crypto.amount || 0);
            }, [state.stocksPortfolio, state.cashHoldings, commodityTotalMan, state.crypto.amount]);

            // --- 🛡️ 生活防衛資金判定マトリクス ---
            // 年間経費から月次生活費を算出し、その5ヶ月分を「生活防衛資金の最低ライン」とする。
            // 初期総資産がこのラインを下回る場合は、NISA枠の設定自体を画面から完全に隠す。
            const emergencyFundCheck = useMemo(() => {
                const monthlyLivingExpenseMan = annualExpensesMan / 12;
                const emergencyFundThresholdMan = monthlyLivingExpenseMan * 5;
                const isBelowEmergencyFund = initialTotalAssetsMan < emergencyFundThresholdMan;
                const shortfallMan = Math.max(0, emergencyFundThresholdMan - initialTotalAssetsMan);
                return { monthlyLivingExpenseMan, emergencyFundThresholdMan, isBelowEmergencyFund, shortfallMan };
            }, [annualExpensesMan, initialTotalAssetsMan]);

            // --- ⚡ NISA投資枠の動的最適化変数 ---
            // 固定枠(手動入力値)ではなく、初期資産の余力 と 年間収支の余剰(配当+副収入-生活費)から、
            // 安全に投資継続できる金額を月1万〜15万円の範囲にスケールダウンして自動算出する。
            const nisaDynamicQuota = useMemo(() => {
                const monthlyLivingExpenseMan = emergencyFundCheck.monthlyLivingExpenseMan;
                const monthlyCashFlowMan = Number(state.monthlyDividendIncome || 0) + (state.sideIncomeEnabled ? Number(state.monthlySideIncome || 0) : 0);
                const monthlySurplusMan = Math.max(0, monthlyCashFlowMan - monthlyLivingExpenseMan);
                // 初期資産の余力係数(0〜1): 資産2000万円で満点になるよう正規化
                const assetBoostFactor = Math.min(1, Math.max(0, initialTotalAssetsMan / 2000));
                const rawMonthlyMan = (monthlySurplusMan * 0.5) + (assetBoostFactor * 10);
                const safeMonthlyMan = Math.min(15, Math.max(1, rawMonthlyMan));
                const safeAnnualMan = Math.round(safeMonthlyMan * 12);
                return { monthlySurplusMan, assetBoostFactor, safeMonthlyMan: Math.round(safeMonthlyMan * 10) / 10, safeAnnualMan };
            }, [state.monthlyDividendIncome, state.monthlySideIncome, state.sideIncomeEnabled, emergencyFundCheck.monthlyLivingExpenseMan, initialTotalAssetsMan]);

            // 実際にシミュレーション計算で使うNISA年間上限(動的モードON時は自動算出値、OFF時は手動入力値)。
            // 生活防衛資金ラインを下回っている場合は、NISAへのシフト自体を停止(0)する。
            const effectiveNisaMaxAnnualLimit = useMemo(() => {
                if (emergencyFundCheck.isBelowEmergencyFund) return 0;
                return state.nisaDynamicMode ? nisaDynamicQuota.safeAnnualMan : Number(state.nisaMaxAnnualLimit || 0);
            }, [emergencyFundCheck.isBelowEmergencyFund, state.nisaDynamicMode, nisaDynamicQuota.safeAnnualMan, state.nisaMaxAnnualLimit]);

            const pensionAdjustment = useMemo(() => {
                const claimAge = Number(state.pension.claimAge) || 65;
                const baseAnnual = Number(state.pension.baseAnnualAmount) || 0;
                const monthsDiff = (claimAge - 65) * 12;
                let rate = 1.0;
                if (monthsDiff < 0) {
                    rate = 1 + (monthsDiff * 0.004);
                } else if (monthsDiff > 0) {
                    rate = 1 + (monthsDiff * 0.007);
                }
                if (rate < 0) rate = 0;
                return {
                    claimAge,
                    ratePct: (rate - 1) * 100,
                    adjustedAnnualMan: baseAnnual * rate
                };
            }, [state.pension]);

            // --- 💰 保有株式群からの年間配当収入(実測) ---
            // 【修正】以前は「加重平均利回りから必要年数を動的算出」する方式を試みたが、現金比率が高い
            // ポートフォリオでは現金の利回り(0%)に希釈されてしまい、カバードコールETFの利回りをどれだけ
            // 上げても必要年数がほぼ動かないという別の不具合が生じた。
            // 標準的なFIREの考え方に立ち返り、「配当収入は生活費の一部を直接カバーする恒常キャッシュフロー」
            // として、生活費(目標額)側から差し引く方式に統一する。こうすることで、保有資産のどこに配当が
            // 増えても(現金比率に関係なく)判定へ確実に反映される。
            const portfolioDividendAnnualMan = useMemo(() => {
                return state.stocksPortfolio.reduce((sum, p) => sum + Number(p.principal || 0) * (Number(p.dividendYield || 0) / 100), 0);
            }, [state.stocksPortfolio]);

            // --- 🎯 FIREスタイル別・目標生活費 ---
            // 「予想配当額(生涯継続)」欄の配当、および保有株式群から実際に生み出される配当収入は、どちらも
            // 生活費を直接カバーする恒常収入とみなし、どのFIREスタイルでも生活費から差し引く。
            // (保有株式の"資産そのもの"は必要資産額の分子である現有資産側に別途カウントされているため、
            //  ここで配当"収入"を差し引いても二重取りにはならない — 高利回り資産ほど必要な貯蓄額が
            //  下がる、という配当重視FIRE戦略の標準的な考え方に合わせている)
            const dividendAnnualMan = Number(state.monthlyDividendIncome || 0) * 12 + portfolioDividendAnnualMan;
            const fireStylePresets = {
                side: { label: 'サイドFIRE (副収入相殺型)', targetAnnualExpenseMan: Math.max(0, annualExpensesMan - dividendAnnualMan - (state.sideIncomeEnabled ? Number(state.monthlySideIncome || 0) * 12 : 0)) },
                standard: { label: '経常予算連動プラン', targetAnnualExpenseMan: Math.max(0, annualExpensesMan - dividendAnnualMan) },
                fat: { label: 'プレミアム拡張型', targetAnnualExpenseMan: Math.max(0, Math.round(annualExpensesMan * 1.3) - dividendAnnualMan) }
            };

            const activePreset = fireStylePresets[state.selectedFireStyle] || fireStylePresets['side'];

            // Simulation Engine Core
            // 🔧 各FIREスタイル(SIDE/STANDARD/FAT)の生涯資産寿命判定にも同じエンジンを使い回せるよう、
            // targetAnnualExpenseManを引数化した純関数として定義する(状態や構成は一切変更していない)。
            const runFireSimulation = (targetAnnualExpenseManParam) => {
                const targetAnnualExpenseMan = targetAnnualExpenseManParam;
                let points = [];
                let executedSpotEventsLog = [];
                
                let portfolios = state.stocksPortfolio.map(s => {
                    const parsedPrincipal = parseFloat(s.principal);
                    const parsedGrowth = parseFloat(s.growthRate);
                    const parsedYield = parseFloat(s.dividendYield);
                    
                    return {
                        ...s,
                        principal: isNaN(parsedPrincipal) ? 0 : parsedPrincipal,
                        growthRate: isNaN(parsedGrowth) ? 0 : parsedGrowth,
                        dividendYield: isNaN(parsedYield) ? 0 : parsedYield,
                        currentVal: (isNaN(parsedPrincipal) ? 0 : parsedPrincipal) * 10000
                    };
                });
                
                let cash = (parseFloat(state.cashHoldings) || 0) * 10000;

                let goldVal = Number(state.commodities.gold.gramsHeld || 0) * Number(state.commodities.gold.currentPrice || 0);
                let platVal = Number(state.commodities.platinum.gramsHeld || 0) * Number(state.commodities.platinum.currentPrice || 0);
                let silverVal = Number(state.commodities.silver.gramsHeld || 0) * Number(state.commodities.silver.currentPrice || 0);
                const goldGrowth = parseFloat(state.commodities.gold.growthRate);
                const platGrowth = parseFloat(state.commodities.platinum.growthRate);
                const silverGrowth = parseFloat(state.commodities.silver.growthRate);

                let crypto = (parseFloat(state.crypto.amount) || 0) * 10000;
                const cryptoGrowth = parseFloat(state.crypto.growthRate);

                let loanRemaining = state.isRenting ? 0 : (parseFloat(state.liabilities.loanAmount) || 0) * 10000;

                const pensionClaimAge = pensionAdjustment.claimAge;
                const pensionAnnualYen = pensionAdjustment.adjustedAnnualMan * 10000;
                
                const totalYears = state.lifeExpectancy - state.currentAge + 1;
                let fireYear = null;
                let fireAge = null;

                const APPROX_COST_RATIO = 0.50; 

                for (let i = 0; i < totalYears; i++) {
                    const age = state.currentAge + i;
                    const spouseAgeCurrent = state.spouseAge + i;
                    const calendarYear = new Date().getFullYear() + i;
                    const inflationFactor = Math.pow(1 + state.inflationRate / 100, i);
                    
                    let baseExpense = targetAnnualExpenseMan * 10000 * inflationFactor;
                    
                    if (i > 0) {
                        goldVal = goldVal * (1 + (isNaN(goldGrowth) ? state.inflationRate : goldGrowth) / 100);
                        platVal = platVal * (1 + (isNaN(platGrowth) ? state.inflationRate : platGrowth) / 100);
                        silverVal = silverVal * (1 + (isNaN(silverGrowth) ? state.inflationRate : silverGrowth) / 100);
                        crypto = crypto * (1 + (isNaN(cryptoGrowth) ? 8.0 : cryptoGrowth) / 100);
                    }
                    let commodities = goldVal + platVal + silverVal;

                    const isPostFire = age >= state.fireAge;
                    const phaseTag = isPostFire ? state.postFireStrategy : 'PRE_FIRE';
                    const emergencyFundTargetYen = annualExpensesMan * 10000 * inflationFactor * (isPostFire ? 4 : 1);

                    if (i < state.nisaTargetYears) {
                        // 🛡️ 生活防衛資金の5ヶ月分を初期資産が下回る場合、および動的算出上限が0の場合はNISAシフトを実行しない
                        let availableShiftQuota = effectiveNisaMaxAnnualLimit * 10000;
                        let nisaAccounts = portfolios.filter(p => p.type === 'nisa');
                        let taxableAccounts = portfolios.filter(p => p.type === 'taxable');
                        
                        if (nisaAccounts.length > 0 && availableShiftQuota > 0) {
                            for (let tAcc of taxableAccounts) {
                                if (availableShiftQuota <= 0) break;
                                if (tAcc.currentVal > 0) {
                                    let shiftAmount = Math.min(tAcc.currentVal, availableShiftQuota);
                                    tAcc.currentVal -= shiftAmount;
                                    availableShiftQuota -= shiftAmount;
                                    nisaAccounts[0].currentVal += shiftAmount;
                                }
                            }
                            if (availableShiftQuota > 0 && cash > 0) {
                                let shiftFromCash = Math.min(cash, availableShiftQuota);
                                cash -= shiftFromCash;
                                availableShiftQuota -= shiftFromCash;
                                nisaAccounts[0].currentVal += shiftFromCash;
                            }
                        }
                    }

                    let targetSellYen = state.loanPrepayment.enabled ? Number(state.commodityAnnualSellAmount || 0) * 10000 : 0;
                    let commoditySaleCashAvailable = 0;
                    if (targetSellYen > 0 && commodities > 0) {
                        let actualSellYen = Math.min(commodities, targetSellYen);
                        commodities -= actualSellYen; 

                        let estimatedGain = actualSellYen * (1 - APPROX_COST_RATIO);
                        if (estimatedGain < 0) estimatedGain = 0;

                        let taxOnGain = 0;
                        const SPECIAL_DEDUCTION = 500000; 

                        if (estimatedGain > SPECIAL_DEDUCTION) {
                            let taxableGainPart = estimatedGain - SPECIAL_DEDUCTION;
                            let finalTaxableBase = taxableGainPart / 2;
                            taxOnGain = finalTaxableBase * 0.20315;
                        }

                        commoditySaleCashAvailable = actualSellYen - taxOnGain;
                    }

                    // 💰 配当金の受取・再投資ループ
                    // NISA口座・特定口座それぞれの配当金は、その口座タイプ自体の来年度の投資元本(現在価値)へ
                    // 100%累積加算する(口座タイプを跨いでの再配分は行わない)。これにより将来価値(5年後・10年後)の
                    // 複利成長がテキスト表示側と正しく連動する。
                    let annualDividendIncome = 0;
                    let reinvestedDividendNisaYen = 0;
                    let reinvestedDividendTaxableYen = 0;
                    let portfolioDividendYen = 0;
                    portfolios.forEach(s => {
                        const dividendGross = s.currentVal * (s.dividendYield / 100);
                        const dividendNet = s.type === 'nisa' ? dividendGross : dividendGross * 0.79685;
                        portfolioDividendYen += dividendNet;
                        if (!isPostFire) {
                            if (s.type === 'nisa') {
                                reinvestedDividendNisaYen += dividendNet;
                            } else {
                                reinvestedDividendTaxableYen += dividendNet;
                            }
                        } else {
                            annualDividendIncome += dividendNet;
                        }
                        s.currentVal = s.currentVal * (1 + s.growthRate / 100);
                    });
                    if (reinvestedDividendNisaYen > 0) {
                        const nisaAccountsForReinvest = portfolios.filter(p => p.type === 'nisa');
                        const totalNisaValForReinvest = nisaAccountsForReinvest.reduce((sum, s) => sum + s.currentVal, 0);
                        if (totalNisaValForReinvest > 0) {
                            nisaAccountsForReinvest.forEach(s => { s.currentVal += reinvestedDividendNisaYen * (s.currentVal / totalNisaValForReinvest); });
                        } else if (nisaAccountsForReinvest[0]) {
                            nisaAccountsForReinvest[0].currentVal += reinvestedDividendNisaYen;
                        }
                    }
                    if (reinvestedDividendTaxableYen > 0) {
                        const taxableAccountsForReinvest = portfolios.filter(p => p.type === 'taxable');
                        const totalTaxableValForReinvest = taxableAccountsForReinvest.reduce((sum, s) => sum + s.currentVal, 0);
                        if (totalTaxableValForReinvest > 0) {
                            taxableAccountsForReinvest.forEach(s => { s.currentVal += reinvestedDividendTaxableYen * (s.currentVal / totalTaxableValForReinvest); });
                        } else if (taxableAccountsForReinvest[0]) {
                            taxableAccountsForReinvest[0].currentVal += reinvestedDividendTaxableYen;
                        }
                    }

                    annualDividendIncome += (Number(state.monthlyDividendIncome || 0) * 12) * 10000;
                    if (state.sideIncomeEnabled) {
                        annualDividendIncome += (Number(state.monthlySideIncome || 0) * 12) * 10000;
                    }

                    let extraExpense = 0;
                    let extraIncome = 0;
                    state.lifeEvents.forEach(e => {
                        if (e.age === age) {
                            if (e.kind === 'expense') extraExpense += e.amount * 10000;
                            if (e.kind === 'income') extraIncome += e.amount * 10000;
                            if (e.kind === 'loanPrepay' && loanRemaining > 0) {
                                const lump = Math.min(loanRemaining, e.amount * 10000);
                                loanRemaining -= lump;
                                extraExpense += lump;
                            }
                        }
                    });

                    state.spotEvents.forEach(se => {
                        if (se.age !== age) return;
                        const requestedYen = Number(se.amount || 0) * 10000;
                        if (requestedYen <= 0) return;

                        if (se.type === 'loanPrepay') {
                            const applied = Math.min(loanRemaining, requestedYen, cash);
                            if (applied > 0) {
                                loanRemaining -= applied;
                                cash -= applied;
                                executedSpotEventsLog.push(`${age}歳(${i}年目)に【現金からローン繰上返済】で ${Math.round(applied / 10000).toLocaleString()}万円をスポット実行しました（ローン残高に反映済み）`);
                            }
                        } else if (se.type === 'commoditySell') {
                            const applied = Math.min(commodities, requestedYen);
                            if (applied > 0) {
                                commodities -= applied;
                                cash += applied;
                                executedSpotEventsLog.push(`${age}歳(${i}年目)に【コモディティ売却(現金化)】で ${Math.round(applied / 10000).toLocaleString()}万円をスポット実行しました（現金に反映済み）`);
                            }
                        } else if (se.type === 'cryptoSell') {
                            const applied = Math.min(crypto, requestedYen);
                            if (applied > 0) {
                                crypto -= applied;
                                cash += applied;
                                executedSpotEventsLog.push(`${age}歳(${i}年目)に【仮想通貨売却(現金化)】で ${Math.round(applied / 10000).toLocaleString()}万円をスポット実行しました（現金に反映済み）`);
                            }
                        }
                    });

                    if (age >= pensionClaimAge && pensionAnnualYen > 0) {
                        extraIncome += pensionAnnualYen * inflationFactor;
                    }

                    if (loanRemaining > 0) {
                        const interestThisYear = loanRemaining * (Number(state.liabilities.loanRate || 0) / 100);
                        let scheduledPrincipal;
                        if (state.liabilities.repaymentType === 'equalPrincipal') {
                            scheduledPrincipal = Math.min(loanRemaining, equalPrincipalPerYearYen);
                        } else {
                            scheduledPrincipal = Math.min(loanRemaining, Math.max(0, loanRepaymentYen - interestThisYear));
                        }
                        loanRemaining -= scheduledPrincipal;
                        extraExpense += (scheduledPrincipal + interestThisYear);

                        if (state.loanPrepayment.enabled && loanRemaining > 0) {
                            const prepayCommodity = Math.min(
                                loanRemaining,
                                Number(state.loanPrepayment.annualFromCommodity || 0) * 10000,
                                commoditySaleCashAvailable
                            );
                            if (prepayCommodity > 0) {
                                loanRemaining -= prepayCommodity;
                                commoditySaleCashAvailable -= prepayCommodity;
                            }
                        }

                        if (state.loanPrepayment.enabled && loanRemaining > 0) {
                            const prepayCashTarget = Number(state.loanPrepayment.annualFromCash || 0) * 10000;
                            const prepayCash = Math.min(loanRemaining, prepayCashTarget, cash);
                            if (prepayCash > 0) {
                                loanRemaining -= prepayCash;
                                extraExpense += prepayCash;
                            }
                        }
                    }

                    if (state.isRenting) {
                        extraExpense += (Number(state.monthlyRent || 0) * 12 * 10000) * inflationFactor;
                    }

                    cash += commoditySaleCashAvailable;

                    let remainingNeeded = baseExpense - (annualDividendIncome + extraIncome - extraExpense);
                    
                    if (remainingNeeded > 0) {
                        if (cash >= remainingNeeded) {
                            cash -= remainingNeeded;
                        } else {
                            remainingNeeded -= cash; cash = 0;
                            portfolios.forEach(s => {
                                if (s.type === 'taxable' && remainingNeeded > 0) {
                                    if (s.currentVal >= remainingNeeded) {
                                        s.currentVal -= remainingNeeded; remainingNeeded = 0;
                                    } else { remainingNeeded -= s.currentVal; s.currentVal = 0; }
                                }
                            });
                            portfolios.forEach(s => {
                                if (s.type === 'nisa' && remainingNeeded > 0) {
                                    if (s.currentVal >= remainingNeeded) {
                                        s.currentVal -= remainingNeeded; remainingNeeded = 0;
                                    } else { remainingNeeded -= s.currentVal; s.currentVal = 0; }
                                }
                            });
                            if (remainingNeeded > 0) {
                                let drawCrypto = Math.min(crypto, remainingNeeded);
                                crypto -= drawCrypto;
                                remainingNeeded -= drawCrypto;
                            }
                            if (remainingNeeded > 0 && commodities > 0) {
                                let desperateWithdraw = Math.min(commodities, remainingNeeded);
                                commodities -= desperateWithdraw;
                                remainingNeeded -= desperateWithdraw;
                            }
                        }
                    } else {
                        cash += Math.abs(remainingNeeded);
                    }

                    if (cash > emergencyFundTargetYen) {
                        let surplus = cash - emergencyFundTargetYen;
                        if (isPostFire && phaseTag === 'FAST_PAYOFF' && loanRemaining > 0) {
                            const extraPrepay = Math.min(surplus, loanRemaining);
                            loanRemaining -= extraPrepay;
                            cash -= extraPrepay;
                        } else {
                            const totalValForSurplus = portfolios.reduce((sum, s) => sum + s.currentVal, 0);
                            if (totalValForSurplus > 0) {
                                portfolios.forEach(s => { s.currentVal += surplus * (s.currentVal / totalValForSurplus); });
                            } else if (portfolios[0]) {
                                portfolios[0].currentVal += surplus;
                            }
                            cash -= surplus;
                        }
                    }

                    const currentNisaSum = portfolios.filter(p => p.type === 'nisa').reduce((sum, p) => sum + p.currentVal, 0);
                    const currentTaxableSum = portfolios.filter(p => p.type === 'taxable').reduce((sum, p) => sum + p.currentVal, 0);
                    let currentYearTotal = currentTaxableSum + currentNisaSum + cash + commodities + crypto;

                    const targetGoal = targetAnnualExpenseMan * 10000 * (100 / state.safeWithdrawalRate);
                    if (fireYear === null && currentYearTotal >= targetGoal && age >= state.fireAge) {
                        fireYear = i; fireAge = age;
                    }

                    {
                        const commodityBaseSum = goldVal + platVal + silverVal;
                        if (commodityBaseSum > 0 && commodities >= 0) {
                            const shrinkRatio = commodities / commodityBaseSum;
                            goldVal *= shrinkRatio;
                            platVal *= shrinkRatio;
                            silverVal *= shrinkRatio;
                        } else {
                            goldVal = 0; platVal = 0; silverVal = 0;
                        }
                    }

                    points.push({
                        year: i, age, spouseAge: spouseAgeCurrent, calendarYear, phase: phaseTag,
                        portfolioDividendMan: Math.round(portfolioDividendYen / 10000),
                        totalAssets: Math.max(0, Math.round(currentYearTotal)),
                        taxableAssets: Math.max(0, Math.round(currentTaxableSum)),
                        cash: Math.max(0, Math.round(cash)),
                        nisa: Math.max(0, Math.round(currentNisaSum)),
                        commodities: Math.max(0, Math.round(commodities)),
                        crypto: Math.max(0, Math.round(crypto)),
                        loanRemaining: Math.round(loanRemaining),
                        pensionIncome: age >= pensionClaimAge ? Math.round(pensionAnnualYen * inflationFactor) : 0
                    });
                }

                const targetGoalValue = targetAnnualExpenseMan * 10000 * (100 / state.safeWithdrawalRate);
                return {
                    points, fireYear, fireAge,
                    achievementPct: targetGoalValue <= 0 ? 100 : Math.min(100, (points[0].totalAssets / targetGoalValue) * 100),
                    targetAnnualExpenseMan, baseAssetsMan: initialTotalAssetsMan,
                    executedSpotEventsLog
                };
            };

            const simResult = useMemo(
                () => runFireSimulation(activePreset.targetAnnualExpenseMan),
                [state, activePreset, commodityTotalMan, loanRepaymentYen, equalPrincipalPerYearYen, initialTotalAssetsMan, pensionAdjustment, annualExpensesMan, effectiveNisaMaxAnnualLimit]
            );

            // --- 🎯 「生活費×25年分（SWR基準・配当収入オフセット済み）」ルールによるFIRE判定 ---
            // 必要年数(25年 = 100/SWR%)自体は固定の標準的な前提のまま、目標生活費側で配当収入
            // (保有株式の配当+予想配当額+副収入)を差し引き済みにすることで、保有アセットの配当利回りを
            // 変更すると現金比率に関係なく確実にFIRE判定へ反映されるようにした。
            // ・現在資産が届いていなければ、リタイア目標年齢までに月いくら積立が必要かを算出。
            // ・届いていれば、25年分ラインを超えた余剰資産からSWR相当で毎月あと何万円まで使えるかを算出。
            const presetAffordability = useMemo(() => {
                const results = {};
                const requiredYears = 100 / (Number(state.safeWithdrawalRate) || 4);
                const currentAssetsMan = Math.round(initialTotalAssetsMan);
                const yearsToFire = Math.max(1, Number(state.fireAge) - Number(state.currentAge));
                Object.entries(fireStylePresets).forEach(([key, preset]) => {
                    const targetMan = preset.targetAnnualExpenseMan;
                    const requiredAssetsMan = Math.round(targetMan * requiredYears);
                    const sustainable = currentAssetsMan >= requiredAssetsMan;
                    const shortfallMan = Math.max(0, requiredAssetsMan - currentAssetsMan);
                    const surplusMan = Math.max(0, currentAssetsMan - requiredAssetsMan);
                    const extraMonthlyMan = sustainable ? Math.round((surplusMan * (Number(state.safeWithdrawalRate) / 100) / 12) * 10) / 10 : 0;
                    const requiredMonthlySavingMan = sustainable ? 0 : Math.round((shortfallMan / yearsToFire / 12) * 10) / 10;
                    results[key] = { sustainable, requiredAssetsMan, currentAssetsMan, shortfallMan, surplusMan, extraMonthlyMan, requiredMonthlySavingMan, targetMan, requiredYears: Math.round(requiredYears * 10) / 10, yearsToFire };
                });
                return results;
            }, [state, initialTotalAssetsMan, annualExpensesMan, fireStylePresets]);

            // --- Handlers ---
            const handleNumberInputChange = (pathArray, rawValue) => {
                const val = rawValue === '' ? '' : Number(rawValue);
                updateState(prev => {
                    const next = { ...prev };
                    let current = next;
                    for (let i = 0; i < pathArray.length - 1; i++) {
                        const key = pathArray[i];
                        current[key] = { ...current[key] };
                        current = current[key];
                    }
                    current[pathArray[pathArray.length - 1]] = val;
                    if(pathArray[0] === 'crypto') {
                        const btcAmt = pathArray[1] === 'btcAmount' ? val : next.crypto.btcAmount;
                        const btcPrace = pathArray[1] === 'currentBtcPrice' ? val : next.crypto.currentBtcPrice;
                        next.crypto.amount = parseFloat(((btcAmt * btcPrace) / 10000).toFixed(2));
                    }
                    return next;
                });
            };

            const updateStockItem = (id, field, value) => {
                updateState(prev => ({
                    ...prev,
                    stocksPortfolio: prev.stocksPortfolio.map(s => s.id === id ? { ...s, [field]: value === '' ? '' : (field === 'label' || field === 'type' ? value : Number(value)) } : s)
                }));
            };

            const handleNumberBlur = (pathArray) => {
                updateState(prev => {
                    const next = { ...prev };
                    let current = next;
                    for (let i = 0; i < pathArray.length - 1; i++) {
                        const key = pathArray[i];
                        current[key] = { ...current[key] };
                        current = current[key];
                    }
                    const lastKey = pathArray[pathArray.length - 1];
                    const v = current[lastKey];
                    if (v === '' || v === null || v === undefined || (typeof v === 'number' && isNaN(v))) {
                        current[lastKey] = 0;
                    }
                    return next;
                });
            };

            const handleStockBlur = (id, field) => {
                updateState(prev => ({
                    ...prev,
                    stocksPortfolio: prev.stocksPortfolio.map(s => {
                        if (s.id !== id) return s;
                        const v = s[field];
                        if (v === '' || v === null || v === undefined || (typeof v === 'number' && isNaN(v))) {
                            return { ...s, [field]: 0 };
                        }
                        return s;
                    })
                }));
            };

            const handleBudgetBlur = (id, field) => {
                updateState(prev => ({
                    ...prev,
                    budgetItems: prev.budgetItems.map(b => {
                        if (b.id !== id) return b;
                        const v = b[field];
                        if (v === '' || v === null || v === undefined || (typeof v === 'number' && isNaN(v))) {
                            return { ...b, [field]: 0 };
                        }
                        return b;
                    })
                }));
            };

            const addStockItem = () => {
                if (!newStock.label || !newStock.principal) return;
                updateState(prev => ({
                    ...prev,
                    stocksPortfolio: [...prev.stocksPortfolio, {
                        id: 's_' + Date.now(),
                        label: newStock.label,
                        type: newStock.type,
                        principal: Number(newStock.principal),
                        growthRate: Number(newStock.growthRate),
                        dividendYield: Number(newStock.dividendYield)
                    }]
                }));
                setNewStock({ label: '', type: 'nisa', principal: '', growthRate: '5.0', dividendYield: '4.0' });
            };

            const removeStockItem = (id) => {
                updateState(prev => ({ ...prev, stocksPortfolio: prev.stocksPortfolio.filter(s => s.id !== id) }));
            };

            const updateBudgetItem = (id, field, value) => {
                updateState(prev => ({
                    ...prev,
                    budgetItems: prev.budgetItems.map(b => b.id === id ? { ...b, [field]: value === '' ? '' : (field === 'label' ? value : Number(value)) } : b)
                }));
            };

            const addBudgetItem = () => {
                if (!newBudget.label || !newBudget.amount) return;
                updateState(prev => ({
                    ...prev,
                    budgetItems: [...prev.budgetItems, {
                        id: 'b_' + Date.now(),
                        label: newBudget.label,
                        amount: Number(newBudget.amount),
                        isAnnual: newBudget.isAnnual,
                        category: 'custom'
                    }]
                }));
                setNewBudget({ label: '', amount: '', isAnnual: false });
            };

            const removeBudgetItem = (id) => {
                updateState(prev => ({ ...prev, budgetItems: prev.budgetItems.filter(b => b.id !== id) }));
            };

            const addLifeEvent = () => {
                if (!newEvent.label || !newEvent.amount) return;
                updateState(prev => ({
                    ...prev,
                    lifeEvents: [...prev.lifeEvents, {
                        id: 'e_' + Date.now(),
                        age: Number(newEvent.age),
                        label: newEvent.label,
                        amount: Number(newEvent.amount),
                        kind: newEvent.kind
                    }].sort((a,b) => a.age - b.age)
                }));
                setNewEvent({ age: 55, label: '', amount: '', kind: 'expense' });
            };

            const removeLifeEvent = (id) => {
                updateState(prev => ({ ...prev, lifeEvents: prev.lifeEvents.filter(e => e.id !== id) }));
            };

            const runDiagnosis = () => {
                setDiagnosing(true);
                setTimeout(() => {
                    const r = simResult;
                    const isSafe = r.points[r.points.length - 1].totalAssets > 0;
                    // 🎯 「不足」「余剰」の判定を分断させず、選択中のFIREスタイルの生涯資産寿命判定(presetAffordability)を
                    // 単一の判断基準として全レポートで使い回す(資産防衛の警告と資産活用の提案を統一)。
                    const currentStyleAffordability = presetAffordability[state.selectedFireStyle];
                    const alreadyPostFire = state.currentAge >= state.fireAge;
                    let text = `========================================================================\n   【FIRE CRYSTAL ENGINE】 高精度複利・マルチアセット診断レポート   \n========================================================================\n\n`;
                    text += `・FIRE達成判定(${fireStylePresets[state.selectedFireStyle].label} / 生活費${currentStyleAffordability.requiredYears}年分・年金非依存基準) : ${currentStyleAffordability.sustainable ? `✅ 達成済み(必要資産${currentStyleAffordability.requiredAssetsMan.toLocaleString()}万円 に対し現有${currentStyleAffordability.currentAssetsMan.toLocaleString()}万円。65歳の年金開始を待たずに退職して大丈夫です)` : `⚠️ 未達(必要資産${currentStyleAffordability.requiredAssetsMan.toLocaleString()}万円 に対し現有${currentStyleAffordability.currentAssetsMan.toLocaleString()}万円。あと${currentStyleAffordability.shortfallMan.toLocaleString()}万円不足、${state.fireAge}歳までに月${currentStyleAffordability.requiredMonthlySavingMan.toLocaleString()}万円の積立が必要)`}\n`;
                    text += `・初期構築総資産額      : ${r.baseAssetsMan.toLocaleString()} 万円\n`;
                    text += `・経常年間予定防衛費    : ${r.targetAnnualExpenseMan.toLocaleString()} 万円 / 年\n`;
                    text += `・予想配当額(生涯継続)  : ${(Number(state.monthlyDividendIncome||0) * 12).toLocaleString()} 万円 / 年\n`;
                    text += `・副収入(生涯継続想定)  : ${state.sideIncomeEnabled ? (Number(state.monthlySideIncome||0) * 12).toLocaleString() + ' 万円 / 年 (有効)' : '0 万円 / 年 (OFF設定中)'}\n`;
                    text += `・適合達成率基準比      : ${r.achievementPct.toFixed(1)} %\n`;
                    text += `・寿命時（${state.lifeExpectancy}歳）最終残高予測: ${Math.round(r.points[r.points.length - 1].totalAssets / 10000).toLocaleString()} 万円\n`;
                    text += `・金利タイプ選択         : ${state.liabilities.loanRateType === 'variable' ? '変動金利システム' : '固定金利システム'}\n`;

                                            className="w-full flex items-center justify-between px-2 py-1.5 rounded-lg bg-slate-900/60 border border-white/10 text-[10px] font-bold text-amber-300 hover:bg-slate-900 transition-colors cursor-pointer"
                                        >
                                            <span>📖 返済方式・繰上げ返済のしくみを解説{showLoanExplainer ? '(閉じる)' : '(開く)'}</span>
                                            <span>{showLoanExplainer ? '▲' : '▼'}</span>
                                        </button>

                                        {showLoanExplainer && loanComparison && (
                                            <div className="p-2.5 rounded-xl bg-slate-950/60 border border-white/10 space-y-2 text-[9px] text-slate-300 leading-relaxed">
                                                <div>
                                                    <span className="font-bold text-white block mb-0.5">① 元利均等 vs 元本均等</span>
                                                    元利均等(毎月一定額)は総利息が<span className="text-red-300 font-bold">約{loanComparison.totalInterestEqualPayment.toLocaleString()}万円</span>になる一方、序盤は利息の割合が高く元金が減りにくいのが特徴です。
                                                    元本均等(元金が毎月一定)は総利息が<span className="text-emerald-300 font-bold">約{loanComparison.totalInterestEqualPrincipal.toLocaleString()}万円</span>と元利均等より少なく済みますが、初期の返済額が大きくなります。差額は約{Math.max(0, loanComparison.totalInterestEqualPayment - loanComparison.totalInterestEqualPrincipal).toLocaleString()}万円です。
                                                </div>
                                                <div>
                                                    <span className="font-bold text-white block mb-0.5">② 繰上げ返済の効果</span>
                                                    現在の設定({commodityTotalMan > 0 ? `コモディティ売却資金${state.loanPrepayment.annualFromCommodity}万/年 + ` : 'コモディティ保有なし(繰上げスキップ) + '}現金{state.loanPrepayment.annualFromCash}万/年)で繰上げ返済すると、完済は当初{loanComparison.originalTerm}年 → 約<span className="text-amber-300 font-bold">{loanComparison.yearsWithPrepay}年</span>({loanComparison.yearsSaved > 0 ? `${loanComparison.yearsSaved}年短縮` : '短縮なし'})になり、総利息は約{loanComparison.totalInterestWithPrepay.toLocaleString()}万円まで下がる見込みです。完済が早まった分だけ、老後後半のキャッシュフローの余裕(生活費からローンが消える期間が延びる)が増えます。
                                                </div>
                                                <div>
                                                    <span className="font-bold text-white block mb-0.5">③ 繰上げ返済 vs 高配当株での運用</span>
                                                    現在のローン金利は{state.liabilities.loanRate}%です。もし手元資金を高配当株や投資に回した場合の期待リターン(成長率+配当利回り)がこの金利より高ければ、理論上は繰上げ返済より投資を優先する方が資産形成上有利になりやすいとされています(金利差分がプラスに働くため)。一方、繰上げ返済は市場変動の影響を受けない「確実にローン金利分だけ得をする」選択であり、無借金になる心理的な安心感も得られます。どちらが正解かは金利水準・投資リターンの不確実性・リスク許容度によって変わるため、一概には決められません。
                                                </div>
                                                <p className="text-[7px] text-slate-500 pt-1 border-t border-white/5">※ 上記は簡易計算による一般的な傾向の解説であり、投資助言ではありません。実際の判断は税制・ご自身のリスク許容度も踏まえてご検討ください。</p>
                                            </div>
                                        )}
                                    </div>
                                    )}

                                    <div className="rounded-xl border border-white/10 bg-white/[0.01] overflow-hidden">
                                        <button
                                            onClick={() => setShowSpotEventsPanel(prev => !prev)}
                                            className="w-full flex items-center justify-between px-3 py-2 text-[11px] font-bold text-slate-200 hover:bg-white/[0.03] transition-colors cursor-pointer"
                                        >
                                            <span>💰 追加オプション：スポット売却・繰上返済イベント {state.spotEvents.length > 0 ? `(${state.spotEvents.length}件登録中)` : ''}</span>
                                            <span className="text-slate-400">{showSpotEventsPanel ? '▲' : '▼'}</span>
                                        </button>
                                        {showSpotEventsPanel && (
                                            <div className="p-3 border-t border-white/10 space-y-3">
                                                <p className="text-[8px] text-slate-500 leading-tight">ボーナスやトレード利益、仮想通貨・コモディティの利益確定タイミングに合わせて、任意の年齢で単発の資産売却・繰上返済を実行できます。</p>

                                                <div className="grid grid-cols-3 gap-1.5">
                                                    <div>
                                                        <span className="text-[8px] text-slate-400 block font-mono">実行年齢</span>
                                                        <input type="number" value={newSpotEvent.age} onChange={(e)=>setNewSpotEvent(prev=>({...prev, age: e.target.value}))} className="glass-input w-full p-1 rounded text-right font-mono text-[11px]" />
                                                    </div>
                                                    <div>
                                                        <span className="text-[8px] text-slate-400 block font-mono">イベントタイプ</span>
                                                        <select value={newSpotEvent.type} onChange={(e)=>setNewSpotEvent(prev=>({...prev, type: e.target.value}))} className="glass-input w-full p-1 rounded text-[10px]">
                                                            <option value="loanPrepay">現金からローン繰上返済</option>
                                                            <option value="commoditySell">コモディティ売却(現金化)</option>
                                                            <option value="cryptoSell">仮想通貨売却(現金化)</option>
                                                        </select>
                                                    </div>
                                                    <div>
                                                        <span className="text-[8px] text-slate-400 block font-mono">金額(万円)</span>
                                                        <input type="number" value={newSpotEvent.amount} onChange={(e)=>setNewSpotEvent(prev=>({...prev, amount: e.target.value}))} placeholder="例: 100" className="glass-input w-full p-1 rounded text-right font-mono text-[11px]" />
                                                    </div>
                                                </div>
                                                <button onClick={addSpotEvent} className="w-full bg-amber-500/20 hover:bg-amber-500/30 text-amber-300 font-bold py-1.5 rounded-lg text-[10px] cursor-pointer tracking-wider uppercase transition-colors border border-amber-500/30">
                                                    ＋ イベントを追加
                                                </button>

                                                {state.spotEvents.length > 0 && (
                                                    <div className="space-y-1 pt-1 border-t border-white/5">
                                                        {state.spotEvents.map(se => (
                                                            <div key={se.id} className="flex items-center justify-between gap-2 p-1.5 rounded-lg bg-white/[0.02] text-[10px] font-mono">
                                                                <span className="text-slate-300">
                                                                    <span className="bg-slate-800 text-white font-bold text-[9px] px-1.5 rounded mr-1">{se.age}歳</span>
                                                                    {spotEventTypeLabel[se.type]}
                                                                </span>
                                                                <div className="flex items-center gap-2">
                                                                    <span className="text-amber-300 font-bold">{se.amount.toLocaleString()}万</span>
                                                                    <button onClick={() => removeSpotEvent(se.id)} className="text-red-400 hover:text-red-300 font-bold cursor-pointer text-sm">🗑</button>
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                )}
                                            </div>
                                        )}
                                    </div>

                                    <div className="space-y-1.5 max-h-[260px] overflow-y-auto pr-1">
                                        {state.budgetItems.map(b => (
                                            <div key={b.id} className="p-2 rounded-xl bg-white/[0.01] border border-white/5 flex flex-col sm:flex-row sm:items-center justify-between gap-1 text-xs font-mono">
                                                <input type="text" value={b.label} onChange={(e) => updateBudgetItem(b.id, 'label', e.target.value)} className="bg-transparent border-b border-transparent hover:border-slate-700 focus:border-amber-400 text-slate-200 font-medium flex-1 mr-2" />
                                                <div className="flex items-center justify-end gap-1.5">
                                                    <input type="number" step="0.1" value={b.amount} onChange={(e) => updateBudgetItem(b.id, 'amount', e.target.value)} onBlur={()=>handleBudgetBlur(b.id, 'amount')} className="glass-input w-16 p-0.5 rounded text-right font-bold text-amber-400" />
                                                    <span className="text-[10px] text-slate-400 w-10">{b.isAnnual ? '万/年' : '万/月'}</span>
                                                    <button onClick={() => removeBudgetItem(b.id)} className="text-red-400 font-bold px-1 hover:text-red-300">×</button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>

                                    <div className="bg-slate-950/40 p-2.5 rounded-xl border border-white/5 space-y-2">
                                        <span className="text-[9px] font-bold text-slate-400 block">+ 予算経費構造の新規項目追加コマンド</span>
                                        <div className="grid grid-cols-1 sm:grid-cols-3 gap-2">
                                            <input type="text" placeholder="項目名 (例: 趣味食費)" value={newBudget.label} onChange={(e)=>setNewBudget(p=>({...p, label:e.target.value}))} className="glass-input p-1 rounded text-xs px-2 col-span-1 sm:col-span-1" />
                                            <input type="number" step="0.1" placeholder="金額(万)" value={newBudget.amount} onChange={(e)=>setNewBudget(p=>({...p, amount:e.target.value}))} className="glass-input p-1 rounded text-xs text-right" />
                                            <select value={newBudget.isAnnual ? "true" : "false"} onChange={(e)=>setNewBudget(p=>({...p, isAnnual: e.target.value === "true"}))} className="glass-input p-1 rounded text-xs">
                                                <option value="false">毎月分支出</option>
                                                <option value="true">年額分支出</option>
                                            </select>
                                        </div>
                                        <button onClick={addBudgetItem} className="w-full bg-slate-800 hover:bg-slate-700 text-white text-[10px] py-1.5 rounded font-bold uppercase transition-colors cursor-pointer">
                                            予算経費項目を追加
                                        </button>
                                    </div>

                                    <div className="border-t border-white/5 pt-3 space-y-2">
                                        <div className="flex justify-between items-center">
                                            <span className="text-[10px] font-bold text-red-400 uppercase">🏠 金利タイプ設定</span>
                                            <div className="flex bg-slate-900 rounded border border-white/10 p-0.5 text-[9px]">
                                                <button onClick={()=>handleNumberInputChange(['liabilities','loanRateType'], 'variable')} className={`px-2 py-0.5 rounded ${state.liabilities.loanRateType === 'variable' ? 'bg-red-500/20 text-red-400 font-bold' : 'text-slate-400'}`}>変動金利</button>
                                                <button onClick={()=>handleNumberInputChange(['liabilities','loanRateType'], 'fixed')} className={`px-2 py-0.5 rounded ${state.liabilities.loanRateType === 'fixed' ? 'bg-amber-500/20 text-amber-400 font-bold' : 'text-slate-400'}`}>固定金利</button>
                                            </div>
                                        </div>
                                        <p className="text-[8px] text-slate-500 leading-tight">※ 借入残高・残期間・金利・返済方式・繰上げ返済の設定は上部の「🏠 住宅ローン返済相当額」欄にまとめてあります。</p>
                                    </div>
                                </div>
                            )}

                            {/* TAB: TIMELINE EVENTS */}
                            {activeTab === 'events' && (
                                <div className="glass-card rounded-2xl p-4 md:p-5 space-y-4">
                                    <h3 className="text-xs font-extrabold text-white tracking-wider uppercase border-b border-white/5 pb-2">ライフイベント個別タイムライン設定</h3>

                                    <div className="bg-slate-950/40 p-3 rounded-xl border border-emerald-500/20 space-y-2 font-mono">
                                        <span className="text-[10px] font-bold text-emerald-400 block">💴 公的年金シミュレーター(繰上げ・繰下げ受給)</span>
                                        <div className="grid grid-cols-2 gap-3">
                                            <div>
                                                <label className="text-[8px] text-slate-400 block">65歳時点の想定年金額 (万円/年)</label>
                                                <input type="number" value={state.pension.baseAnnualAmount} onChange={(e)=>handleNumberInputChange(['pension', 'baseAnnualAmount'], e.target.value)} onBlur={()=>handleNumberBlur(['pension', 'baseAnnualAmount'])} className="glass-input w-full p-1 rounded text-right text-emerald-400 font-bold text-xs" />
                                            </div>
                                            <div>
                                                <label className="text-[8px] text-slate-400 block">受給開始年齢 (60〜75歳)</label>
                                                <input type="number" min="60" max="75" value={state.pension.claimAge} onChange={(e)=>handleNumberInputChange(['pension', 'claimAge'], e.target.value)} onBlur={()=>handleNumberBlur(['pension', 'claimAge'])} className="glass-input w-full p-1 rounded text-right text-emerald-400 font-bold text-xs" />
                                            </div>
                                        </div>
                                        <p className="text-[9px] text-slate-300 pt-1 border-t border-white/5">
                                            {pensionAdjustment.claimAge}歳受給開始の場合: 年間 <span className="text-emerald-400 font-bold">{Math.round(pensionAdjustment.adjustedAnnualMan).toLocaleString()}万円</span>
                                            <span className={pensionAdjustment.ratePct >= 0 ? 'text-emerald-400' : 'text-rose-400'}> ({pensionAdjustment.ratePct >= 0 ? '+' : ''}{pensionAdjustment.ratePct.toFixed(1)}% 65歳基準比)</span>
                                        </p>
                                        <span className="text-[7px] text-slate-500 block">※ 日本の年金制度に準拠: 繰上げ(60〜64歳)は1ヶ月あたり0.4%減額、繰下げ(66〜75歳)は1ヶ月あたり0.7%増額で試算(2022年4月以降ルール)。受給開始年齢からグラフ・総資産に自動反映されます。</span>
                                    </div>
                                    
                                    <div className="space-y-2 max-h-[180px] overflow-y-auto pr-1">
                                        {state.lifeEvents.map(e => (
                                            <div key={e.id} className="p-2 rounded-xl bg-white/[0.01] border border-white/5 flex justify-between items-center font-mono text-xs">
                                                <div className="flex items-center gap-1.5">
                                                    <span className="bg-slate-800 text-slate-200 font-bold text-[9px] px-1.5 rounded">{e.age}歳</span>
                                                    <span className="text-slate-300">{e.label}</span>
                                                </div>
                                                <div className="flex items-center gap-2">
                                                    <span className={`font-bold ${e.kind === 'expense' ? 'text-rose-400' : e.kind === 'loanPrepay' ? 'text-amber-400' : 'text-emerald-400'}`}>
                                                        {e.kind === 'income' ? '+' : '-'}{e.amount.toLocaleString()}万{e.kind === 'loanPrepay' ? ' (繰上返済)' : ''}
                                                    </span>
                                                    <button onClick={() => removeLifeEvent(e.id)} className="text-red-400 hover:text-red-300 font-bold cursor-pointer text-sm">×</button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>

                                    <div className="bg-slate-950/40 p-3 rounded-xl border border-white/5 space-y-2">
                                        <span className="text-[9px] font-bold text-slate-400 block uppercase">イベントオブジェクトの追加コマンド</span>
                                        <div className="grid grid-cols-3 gap-2">
                                            <div>
                                                <span className="text-[8px] text-slate-400 block font-mono">発生年齢</span>
                                                <input type="number" value={newEvent.age} onChange={(e)=>setNewEvent(prev=>({...prev, age: e.target.value}))} className="glass-input w-full p-1 rounded font-mono text-xs text-right" />
                                            </div>
                                            <div className="col-span-2">
                                                <span className="text-[8px] text-slate-400 block font-mono">イベント識別ラベル名</span>
                                                <input type="text" placeholder="例: 相続インフロー、時計資産" value={newEvent.label} onChange={(e)=>setNewEvent(prev=>({...prev, label: e.target.value}))} className="glass-input w-full p-1 rounded text-xs px-2" />
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-2">
                                            <div>
                                                <span className="text-[8px] text-slate-400 block font-mono">金額 (万円)</span>
                                                <input type="number" value={newEvent.amount} onChange={(e)=>setNewEvent(prev=>({...prev, amount: e.target.value}))} className="glass-input w-full p-1 rounded font-mono text-xs text-right" />
                                            </div>
                                            <div>
                                                <span className="text-[8px] text-slate-400 block font-mono">イベントデータ種別</span>
                                                <select value={newEvent.kind} onChange={(e)=>setNewEvent(prev=>({...prev, kind: e.target.value}))} className="glass-input w-full p-1 rounded text-xs">
                                                    <option value="expense">キャッシュアウト (臨時支出)</option>
                                                    <option value="income">インフロー (臨時収入・年金)</option>
                                                    <option value="loanPrepay">🏠 住宅ローン繰上げ返済(単発・現金)</option>
                                                </select>
                                            </div>
                                        </div>
                                        <button onClick={addLifeEvent} className="w-full bg-slate-800 hover:bg-slate-700 text-white font-bold py-1.5 rounded-lg text-[10px] cursor-pointer transition-colors">
                                            タイムラインへ反映
                                        </button>
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* RIGHT DIAGNOSIS COLUMN */}
                        <div className="lg:col-span-6 space-y-4 md:space-y-6">
                            <div className="space-y-3">
                                <button
                                    onClick={handleDiagnosisButtonClick} disabled={diagnosing}
                                    className="w-full bg-gradient-to-r from-amber-400 via-yellow-500 to-purple-600 hover:opacity-95 text-slate-950 text-xs font-black py-3 rounded-2xl shadow-xl cursor-pointer tracking-wider flex items-center justify-center gap-2 transition-all"
                                >
                                    <span>{diagnosing ? 'マトリクス解析エンジン駆動中...' : (showDiagnosis ? '📊 診断シートを閉じる' : '📊 詳細シミュレーション診断シートを生成')}</span>
                                </button>

                                {showDiagnosis && (
                                    <div className="glass-card rounded-2xl p-4 md:p-5 space-y-2 border border-amber-400/20">
                                        <div className="flex items-center gap-2 pb-2 border-b border-white/5">
                                            <span className="h-2 w-2 rounded-full bg-amber-400 animate-pulse"></span>
                                            <span className="font-display text-xs font-black text-white uppercase tracking-wider">SYSTEM ANALYTICAL REPORT DIRECTORY</span>
                                        </div>
                                        <pre className="font-mono text-[10px] md:text-xs leading-relaxed text-[#b4bcd0] whitespace-pre-wrap overflow-x-auto bg-black/40 p-3 rounded-xl border border-white/5 max-h-[340px]">
                                            {diagnosisText}
                                        </pre>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>

                    {/* 法的免責事項ステートメント */}
                    <footer className="w-full text-center py-4 px-2 border-t border-white/5 mt-6">
                        <p className="text-[10px] md:text-xs font-medium text-amber-400/80 tracking-wide max-w-4xl mx-auto leading-relaxed">
                            ⚠️ <strong>【免責事項】</strong> 本ツールによる試算はあくまでシミュレーション上の予測であり、将来の投資成果を保証するものではなく、また投資助言を行うものではありません。実際の資産運用にあたにあたっては個人の責任と判断のもとで行ってください。
                        </p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
